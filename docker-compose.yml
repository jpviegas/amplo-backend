services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: amplo-backend:latest
    container_name: amplo-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(5001,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
